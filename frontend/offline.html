<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - 30-Year Life Masterplan</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: #0a0908;
      color: #e8e2d8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .offline-container {
      max-width: 400px;
      padding: 40px 20px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: #c9a84c;
      margin-bottom: 16px;
    }
    p {
      font-size: 14px;
      color: #7a7268;
      line-height: 1.7;
      margin-bottom: 24px;
    }
    button {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 12px 24px;
      background: #c9a84c;
      color: #0a0908;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      transition: background 0.15s;
    }
    button:hover {
      background: #e8c96a;
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <h1>You're Offline</h1>
    <p>Your masterplan is cached and available offline. Some features may be limited until you reconnect.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
